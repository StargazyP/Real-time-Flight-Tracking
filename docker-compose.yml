version: '3.8'

services:
  realtimeplane:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realtimeplane-app
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

